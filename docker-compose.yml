services:

  postgres:
    image: postgres
    environment:
      POSTGRES_DB: banca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  ms-cliente:
    build: ./ms-cliente
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - rabbitmq

  ms-cuenta:
    build: ./ms-cuenta
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - rabbitmq